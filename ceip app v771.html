<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CEIP SS">
<meta name="theme-color" content="#14532d">
<title>CEIP San Sebastián · Gestión Plantilla</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --vd:#14532d;--vd2:#15803d;--vd3:#4ade80;
  --az:#1d4ed8;--rj:#dc2626;--am:#d97706;--mo:#7c3aed;
  --gr:#f1f5f9;--bd:#e2e8f0;--tx:#0f172a;--sg:#64748b;
}
html,body{height:100%;background:#f0f4f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tx)}
body{display:flex;flex-direction:column;overflow:hidden}

/* LOGIN */
#login{display:none!important}
.lcard{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.llogo{width:72px;height:72px;background:linear-gradient(135deg,#14532d,#15803d);border-radius:18px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:32px}
.ltitle{font-size:20px;font-weight:900;color:#14532d;margin-bottom:4px}
.lsub{font-size:12px;color:#64748b;margin-bottom:24px}
.linput{width:100%;padding:13px 16px;border:2px solid #d1fae5;border-radius:12px;font-size:16px;background:#f0fdf4;color:#14532d;font-weight:600;outline:none;margin-bottom:10px;display:block}
.linput:focus{border-color:#15803d}
.lerr{display:none;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:8px 12px;color:#b91c1c;font-size:12px;font-weight:600;margin-bottom:10px;text-align:left}
.lbtn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#15803d,#14532d);color:#fff;font-size:16px;font-weight:800;cursor:pointer}
.lreset{display:block;margin-top:14px;color:#9ca3af;font-size:11px;cursor:pointer;text-decoration:underline}

/* APP */
#app{display:none;flex-direction:column;height:100%}

/* HEADER */
.hdr{background:linear-gradient(135deg,#14532d,#15803d);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-ico{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr h1{font-size:13px;font-weight:800;line-height:1.2}
.hdr p{font-size:9px;opacity:.7}
.hdr-r{display:flex;align-items:center;gap:6px}
.sync-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:#94a3b8}
.sdot.ok{background:#4ade80}.sdot.err{background:#f87171}
.sdot.spin{background:#fbbf24;animation:sp .8s infinite}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.2}}
#stxt{font-size:10px}

/* BODY */
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}

/* PÁGINAS */
.pg{display:none}.pg.on{display:block}

/* HOME MÓDULO */
.mhero{padding:20px 16px 24px;color:#fff}
.mhero h2{font-size:22px;font-weight:900;margin-bottom:4px}
.mhero p{font-size:12px;opacity:.8}

/* GRID ICONOS */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 14px 0}
.icard{border-radius:16px;padding:18px 12px 14px;text-align:center;cursor:pointer;border:none;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:120px;box-shadow:0 3px 12px rgba(0,0,0,.08);transition:transform .1s}
.icard:active{transform:scale(.95)}
.icard .ico{font-size:38px;line-height:1}
.icard .nom{font-size:13px;font-weight:800;line-height:1.2}
.icard .des{font-size:10px;opacity:.7;line-height:1.3}
.icard.full{grid-column:1/-1;flex-direction:row;justify-content:flex-start;gap:14px;min-height:72px;padding:14px 18px;text-align:left}
.icard.full .ico{font-size:28px}
.ic-vd{background:linear-gradient(145deg,#dcfce7,#bbf7d0);color:#14532d}
.ic-az{background:linear-gradient(145deg,#dbeafe,#bfdbfe);color:#1e3a8a}
.ic-mo{background:linear-gradient(145deg,#ede9fe,#ddd6fe);color:#4c1d95}
.ic-am{background:linear-gradient(145deg,#fef3c7,#fde68a);color:#78350f}
.ic-rj{background:linear-gradient(145deg,#fee2e2,#fecaca);color:#7f1d1d}
.ic-pk{background:linear-gradient(145deg,#fce7f3,#fbcfe8);color:#831843}
.ic-cy{background:linear-gradient(145deg,#e0f2fe,#bae6fd);color:#0c4a6e}
.ic-gy{background:linear-gradient(145deg,#f1f5f9,#e2e8f0);color:#1e293b}

/* SECCIÓN CON VOLVER */
.snav{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10}
.bback{width:36px;height:36px;border-radius:10px;background:var(--gr);border:1px solid var(--bd);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--vd);font-weight:700;flex-shrink:0}
.snav-t{font-size:15px;font-weight:800}
.snav-s{font-size:11px;color:var(--sg)}
.scnt{padding:12px}
.sec{display:none}.sec.on{display:block}

/* BARRA INFERIOR */
.nbar{position:fixed;bottom:0;left:0;right:0;height:66px;background:rgba(255,255,255,.97);border-top:1px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -3px 16px rgba(0,0,0,.08);z-index:100}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;padding:6px 4px}
.nbtn .ni{font-size:24px;transition:transform .15s}
.nbtn .nl{font-size:10px;font-weight:600;color:var(--sg)}
.nbtn.on .ni{transform:translateY(-2px)}
.nbtn.on .nl{color:var(--vd2);font-weight:800}
.nbtn::after{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;border-radius:0 0 3px 3px;background:var(--vd2);transform:scaleX(0);transition:.15s}
.nbtn.on::after{transform:scaleX(1)}
.ndot{position:absolute;top:5px;right:calc(50% - 18px);width:8px;height:8px;border-radius:50%;background:#ef4444;border:2px solid #fff;display:none}
.ndot.on{display:block}

/* CARDS CONTENIDO */
.card{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:13px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ct{font-weight:700;font-size:13px;margin-bottom:9px}
.al{border-radius:8px;padding:8px 11px;font-size:12px;margin-bottom:8px;display:flex;gap:7px;align-items:flex-start;border-left:4px solid;line-height:1.5}
.al.i{background:#eff6ff;border-color:#3b82f6}
.al.ok{background:#f0fdf4;border-color:#15803d}
.al.w{background:#fffbeb;border-color:#f59e0b}
.al.e{background:#fef2f2;border-color:#dc2626}
.pill{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:700}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:700}
.gn{background:#dcfce7;color:#15803d}.bl{background:#dbeafe;color:#1d4ed8}
.rd{background:#fee2e2;color:#b91c1c}.am{background:#fef3c7;color:#92400e}
.gy{background:#f1f5f9;color:#475569}.mo{background:#ede9fe;color:#7c3aed}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.bvd{background:#15803d;color:#fff}.baz{background:#1d4ed8;color:#fff}
.brd{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.bgy{background:#f1f5f9;color:#475569;border:1px solid var(--bd)}
.bsm{padding:5px 10px;font-size:11px;border-radius:6px}
.badd{width:100%;padding:11px;border-radius:10px;border:2px dashed var(--bd);background:#fff;color:#15803d;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
/* MAESTRO CARD */
.mc{background:#fff;border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;overflow:hidden}
.mch{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;user-select:none}
.mcb{padding:12px;background:#f8fafc;border-top:1px solid var(--bd);display:none}
.mcb.on{display:block}
.fr{margin-bottom:9px}
.fl{display:block;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.fi{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:8px;font-size:15px;background:#fff;-webkit-appearance:none;-webkit-user-select:text;user-select:text;outline:none}
.fi:focus{border-color:#15803d;box-shadow:0 0 0 3px rgba(21,128,61,.12)}
input[type=number].fi{max-width:85px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ck{display:flex;align-items:center;gap:10px;padding:7px 0}
.ck input{width:20px;height:20px;accent-color:#15803d;flex-shrink:0}
.hbar{display:flex;align-items:center;gap:6px;margin-top:4px}
.ht{flex:1;height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden;max-width:120px}
.hf{height:100%;border-radius:4px}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.mtr{background:#f8fafc;border-radius:9px;padding:10px 11px}
.mtr.ok{background:#f0fdf4;border:1px solid #bbf7d0}
.mtr.w{background:#fff7ed;border:1px solid #fed7aa}
.ml{display:block;font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.mv{font-size:20px;font-weight:800;color:#1d4ed8;line-height:1}
.mtr.ok .mv{color:#15803d}.mtr.w .mv{color:#ea580c}
.ms{font-size:10px;color:#94a3b8;margin-top:1px}
.bw{flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.br{height:100%;border-radius:4px;transition:width .4s}
.brow{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.blb{font-size:10px;color:#94a3b8;min-width:88px}
/* HORARIO */
.hw{overflow-x:auto;-webkit-overflow-scrolling:touch}
.ht2{border-collapse:collapse;min-width:540px;width:100%}
.ht2 th{background:#14532d;color:#fff;padding:6px 8px;font-size:11px;font-weight:700;text-align:center}
.ht2 td{border:1px solid var(--bd);padding:0;vertical-align:top}
.ht2 td.hl{background:#f8fafc;font-size:10px;color:#94a3b8;font-weight:700;text-align:right;padding:4px 6px;white-space:nowrap;border-right:2px solid var(--bd);min-width:46px}
.sl{min-height:32px;padding:3px 5px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;font-size:11px;font-weight:600;line-height:1.3}
.sl.rec{background:#f1f5f9;color:#64748b;cursor:default;font-style:italic}
.sl.vac{background:#fff;color:#cbd5e1}
.sl.fij{outline:2px solid rgba(0,0,0,.15);outline-offset:-2px}
.sa{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp{font-size:9px;opacity:.75;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sed{background:#dbeafe;border:2px solid #1d4ed8;border-radius:10px;padding:12px;margin-top:8px}
/* SUST */
.dtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.dtab{padding:7px 12px;border-radius:8px;border:1.5px solid var(--bd);background:#fff;color:#64748b;font-size:12px;font-weight:600;cursor:pointer}
.dtab.on{background:#dc2626;color:#fff;border-color:#dc2626}
.mfbtn{padding:7px 13px;border-radius:8px;border:1.5px solid var(--bd);background:#fff;font-size:12px;font-weight:500;cursor:pointer}
.mfbtn.falta{background:#fef2f2;border-color:#dc2626;color:#b91c1c;font-weight:700}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#14532d;color:#fff;padding:7px 9px;text-align:center;border:1px solid #166534}
.tbl th.th0{background:#374151}
.tbl td{border:1px solid var(--bd);padding:0;vertical-align:top}
.tbl td.td0{background:#f8fafc;font-size:10px;font-weight:700;color:#94a3b8;padding:5px 7px;text-align:center;border-right:2px solid var(--bd);white-space:nowrap}
.tcell{min-height:42px;padding:5px 7px;cursor:pointer;background:#fff}
.tcell:hover{background:#f0fdf4}
.tcell.asig{background:#f0fdf4}
.tcell.xmark{background:#f8fafc;text-align:center;color:#cbd5e1;font-size:16px;font-weight:700;line-height:42px}
/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:14px;padding:18px;width:100%;max-width:350px;max-height:80vh;overflow-y:auto}
.mt{font-size:14px;font-weight:800;color:#b91c1c;margin-bottom:14px}
/* ASIG */
.ar{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f1f5f9}
.ar:last-child{border:none}
.ag{font-size:12px;font-weight:700;color:#7c3aed;min-width:48px}
.am2{flex:1;font-size:12px}
.ah{font-size:12px;font-weight:800;min-width:34px;text-align:right;color:#1d4ed8}
.add-a{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0;border-top:1px solid var(--bd);margin-top:6px;align-items:flex-end}
.add-a select,.add-a input{padding:6px 8px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;background:#fff;-webkit-appearance:none}
.add-a input[type=number]{width:58px;text-align:center}
/* OTROS */
.tt{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.tb{border-radius:10px;padding:12px}
.tb-ok{background:#f0fdf4;border:1px solid #bbf7d0}
.tb-e{background:#fef2f2;border:1px solid #fca5a5}
.tr2{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:12px}
.esc{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.ec{border-radius:10px;padding:12px}
.er{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:11px}
.rec2{border-radius:10px;padding:12px;margin-top:8px;border:2px solid}
.ld{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin:8px 0}
.ldi{text-align:center;background:#fff;border:1px solid #ddd6fe;border-radius:8px;padding:7px 4px}
.prg{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.plb{font-size:11px;min-width:88px;color:#94a3b8}
.pbw{flex:1;height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.pbr{height:100%;border-radius:4px}
.pv{font-size:11px;font-weight:700;min-width:50px;text-align:right}
.cfg-i{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f8fafc;border-radius:8px;margin-bottom:6px}
.gr-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.gr-c{text-align:center;background:#f8fafc;border:1px solid var(--bd);border-radius:8px;padding:7px 8px;min-width:60px}
.gr-l{display:block;font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:3px}
.gr-c input{width:48px;font-size:16px;font-weight:800;text-align:center;border:1.5px solid var(--bd);border-radius:6px;padding:4px;background:#fff}
.hs{width:100%;border-collapse:collapse;font-size:12px}
.hs th{background:#14532d;color:#fff;padding:6px 8px;text-align:left;font-size:11px}
.hs td{padding:5px 8px;border-bottom:1px solid #f1f5f9}
.hs tr.hi{background:#f0fdf4}
.carga-r{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid #f1f5f9}
@media(max-width:400px){.g2,.g3,.tt,.esc,.fg2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <div class="llogo">🏫</div>
    <div class="ltitle">CEIP San Sebastián</div>
    <div class="lsub">Gestión de Plantilla · Equipo Directivo</div>
    <input class="linput" id="lpwd" type="password" placeholder="Contraseña..."
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="lerr" id="lerr">Contraseña incorrecta</div>
    <button class="lbtn" onclick="doLogin()">Entrar →</button>
    <span class="lreset" onclick="doPwdReset()">¿Olvidaste la contraseña? Pulsa aquí</span>
  </div>
</div>

<!-- APP -->
<div id="app">

  <header class="hdr">
    <div class="hdr-l">
      <div class="hdr-ico">🏫</div>
      <div>
        <h1>CEIP San Sebastián</h1>
        <p>Gestión de Plantilla · 22.5h lectivas</p>
      </div>
    </div>
    <div class="hdr-r">
      <button class="sync-btn" onclick="doSync()">
        <div class="sdot" id="sdot"></div>
        <span id="stxt">Local</span>
        <span>↻</span>
      </button>
    </div>
  </header>

  <div class="body">

    <!-- PLANTILLA -->
    <div class="pg on" id="pg-plantilla">
      <div id="ph"><!-- home plantilla --></div>
      <div id="ps" style="display:none">
        <div class="snav">
          <button class="bback" onclick="backHome('plantilla')">←</button>
          <div><div class="snav-t" id="ps-t"></div><div class="snav-s" id="ps-s"></div></div>
        </div>
        <div class="scnt">
          <div id="s-balance" class="sec"></div>
          <div id="s-horas" class="sec"></div>
          <div id="s-claustro" class="sec"></div>
          <div id="s-docencia" class="sec"></div>
          <div id="s-tutorias" class="sec"></div>
          <div id="s-escenarios" class="sec"></div>
          <div id="s-libre" class="sec"></div>
        </div>
      </div>
    </div>

    <!-- HORARIOS -->
    <div class="pg" id="pg-horarios">
      <div id="hh"><!-- home horarios --></div>
      <div id="hs2" style="display:none">
        <div class="snav">
          <button class="bback" onclick="backHome('horarios')">←</button>
          <div><div class="snav-t" id="hs2-t"></div><div class="snav-s" id="hs2-s"></div></div>
        </div>
        <div class="scnt">
          <div id="s-hgrupos" class="sec"></div>
          <div id="s-hmaterias" class="sec"></div>
          <div id="s-hcarga" class="sec"></div>
          <div id="s-hhorario" class="sec"></div>
          <div id="s-hresumen" class="sec"></div>
        </div>
      </div>
    </div>

    <!-- SUSTITUCIONES -->
    <div class="pg" id="pg-sust">
      <div id="pg-sust-inner"></div>
    </div>

    <!-- CONFIG -->
    <div class="pg" id="pg-config">
      <div class="mhero" style="background:linear-gradient(135deg,#1f2937,#374151)">
        <h2>⚙️ Configuración</h2>
        <p>Ajustes y conexión con Google Sheets</p>
      </div>
      <div class="scnt" id="pg-config-inner"></div>
    </div>

  </div>

  <!-- BARRA INFERIOR -->
  <nav class="nbar">
    <button class="nbtn on" id="nb-plantilla" onclick="goMod('plantilla',this)">
      <span class="ni">👥</span><span class="nl">Plantilla</span>
    </button>
    <button class="nbtn" id="nb-horarios" onclick="goMod('horarios',this)">
      <span class="ni">📅</span><span class="nl">Horarios</span>
    </button>
    <button class="nbtn" id="nb-sust" onclick="goMod('sust',this)">
      <span class="ni">🔄</span><span class="nl">Sustituciones</span>
      <span class="ndot" id="ndot-sust"></span>
    </button>
    <button class="nbtn" id="nb-config" onclick="goMod('config',this)">
      <span class="ni">⚙️</span><span class="nl">Config.</span>
    </button>
  </nav>

</div>

<!-- MODAL SUST -->
<div class="modal" id="modal-sust" onclick="if(event.target===this)closeModal()">
  <div class="mbox">
    <div class="mt" id="modal-t"></div>
    <div class="fr"><span class="fl">Grupo</span>
      <input class="fi" type="text" id="m-grupo" placeholder="4oA, 5oB..."></div>
    <div class="fr"><span class="fl">Maestro/a que sustituye</span>
      <select class="fi" id="m-mae"></select></div>

// ═══════════════════════════════════════════════════

function save(){
  try{
    var json = JSON.stringify(DB);
    localStorage.setItem(KDAT, json);
    setSync('ok','Guardado '+hhmm());
    return true;
  }catch(e){
    alert('Error al guardar: '+e.message+'\n\nComprueba que no estás en modo privado/incógnito');
    return false;
  }
}

function load(){
  // Intentar cargar con clave nueva
  var raw = null;
  try{ raw = localStorage.getItem(KDAT); }catch(e){}
  
  if(raw && raw.length > 100){
    try{
      DB = JSON.parse(raw);
      // Asegurar campos obligatorios
      if(!DB.maestros || DB.maestros.length === 0) DB = DEF();
      if(!DB.tramos || DB.tramos.length === 0) DB.tramos = DEF().tramos;
      if(!DB.materias) DB.materias = DEF().materias;
      if(!DB.hGrupos) DB.hGrupos = DEF().hGrupos;
      if(!DB.hMat) DB.hMat = DEF().hMat;
      if(!DB.hCarga) DB.hCarga = {};
      if(!DB.hHor) DB.hHor = {};
      DB.maestros.forEach(function(m){
        if(!m.asig) m.asig = [];
        if(!m.gRef) m.gRef = '';
      });
      calcFranjas();
      return true;
    }catch(e){ DB = null; }
  }
  
  // Sin datos — usar por defecto
  DB = DEF();
  calcFranjas();
  return false;
}

function calcFranjas(){
  HFRANJAS = [];
  var cur=DB.hJornada.ini, fin=DB.hJornada.fin;
  var rI=DB.hJornada.recIni, rD=DB.hJornada.recDur;
  while(cur<fin){
    if(cur===rI){HFRANJAS.push({ini:cur,dur:rD,r:true});cur+=rD;}
    else{var d=60;if(cur+d>fin)d=fin-cur;if(cur<rI&&cur+d>rI)d=rI-cur;HFRANJAS.push({ini:cur,dur:d,r:false});cur+=d;}
  }
}

function getPwd(){ return localStorage.getItem(KPWD) || DPWD; }

function doLogin(){
  var v = document.getElementById('lpwd').value.trim();
  var ok = false;

  // 1. Contraseña de fábrica — SIEMPRE funciona
  if(v === DPWD) ok = true;

  // 2. Contraseña guardada en esta clave
  if(!ok){ var p1 = localStorage.getItem(KPWD); if(p1 && v === p1) ok = true; }

  // 3. Contraseña en claves antiguas (compatibilidad)
  if(!ok){ var p2 = localStorage.getItem('ceip_pwd'); if(p2 && v === p2) ok = true; }
  if(!ok){ var p3 = localStorage.getItem('ceip_pwd_v7'); if(p3 && v === p3) ok = true; }

  // 4. Contraseña en DB guardado
  if(!ok){
    try{
      var raw = localStorage.getItem(KDAT);
      if(raw){ var d = JSON.parse(raw); if(d.pwd && v === d.pwd) ok = true; }
    }catch(e){}
  }

  if(ok){
    sessionStorage.setItem('ceip_s','1');
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('lerr').style.display = 'none';
    startApp();
  } else {
    document.getElementById('lerr').style.display = 'block';
    document.getElementById('lerr').textContent = 'Contraseña incorrecta. Prueba con ceip2025';
    document.getElementById('lpwd').value = '';
    document.getElementById('lpwd').focus();
    if(navigator.vibrate) navigator.vibrate([100,50,100]);
  }
}

// ═══════════════════════════════════════════════════
// SYNC
// ═══════════════════════════════════════════════════
function setSync(t,txt){
  var d=document.getElementById('sdot');
  var l=document.getElementById('stxt');
  d.className='sdot'+(t==='ok'?' ok':t==='err'?' err':t==='spin'?' spin':'');
  l.textContent=txt||'Local';
}

function doSync(){
  // Guardar local SIEMPRE — esto nunca falla
  var ok = save();
  if(!ok) return; // si save() falla ya muestra el error

  // Si no hay script configurado, terminar aquí
  // Los datos están guardados localmente
  var url = DB.scriptUrl;
  if(!url){
    setSync('ok','Guardado ' + hhmm());
    return;
  }

  // Subir a Sheets via JSONP
  // NUNCA leer de vuelta — local es siempre la fuente de verdad
  setSync('spin','Subiendo a Sheets...');
  var cb = '_cb' + Date.now();
  var datos = {
    maestros: DB.maestros,
    grupos: DB.grupos,
    pwd: DB.pwd || ''
  };
  var src = url + '?accion=guardar&callback=' + cb +
    '&datos=' + encodeURIComponent(JSON.stringify(datos));

  window[cb] = function(r){
    delete window[cb];
    var el = document.getElementById('jsonp_' + cb);
    if(el && el.parentNode) el.parentNode.removeChild(el);
    if(r && r.ok){
      setSync('ok', 'Guardado en Sheets ' + hhmm());
    } else {
      setSync('ok', 'Guardado local ' + hhmm());
    }
  };

  var s = document.createElement('script');
  s.id = 'jsonp_' + cb;
  s.src = src;
  s.onerror = function(){
    delete window[cb];
    setSync('ok', 'Guardado local ' + hhmm());
  };
  document.head.appendChild(s);

  // Timeout de 8 segundos
  setTimeout(function(){
    if(window[cb]){
      delete window[cb];
      var el = document.getElementById('jsonp_' + cb);
      if(el && el.parentNode) el.parentNode.removeChild(el);
      setSync('ok', 'Guardado local ' + hhmm());
    }
  }, 8000);
}

// Recibir cambios de OTRO dispositivo (llamar manualmente desde Config.)
function recibirCambios(){
  var sid = DB.sheetId;
  if(!sid){ alert('No hay Sheet ID configurado'); return; }
  setSync('spin','Leyendo Sheets...');
  fetch('https://docs.google.com/spreadsheets/d/'+sid+
    '/gviz/tq?tqx=out:csv&sheet=Maestros&_='+Date.now(),{cache:'no-store'})
  .then(function(r){ return r.text(); })
  .then(function(csv){
    if(!csv||csv.length<50){ alert('Sheets vacío o sin datos'); setSync('ok',hhmm()); return; }
    var mae = parseCSV(csv);
    if(!mae||mae.length<1){ alert('No se pudieron leer datos de Sheets'); setSync('ok',hhmm()); return; }
    // Preguntar antes de sobreescribir
    if(!confirm('Se van a cargar los datos de Sheets.

Atención: los cambios locales que no hayas subido se perderán.

¿Continuar?')) return;
    DB.maestros = mae;
    save();
    renderActiveSec();
    setSync('ok','Datos de Sheets cargados ' + hhmm());
    alert('✅ Datos recibidos de Sheets: ' + mae.length + ' maestros');
  })
  .catch(function(e){ setSync('err','Error: '+e.message); });
}

function parseCSV(csv){
  var lin=csv.split('\n').filter(function(l){return l.trim();});
  if(lin.length<2) return null;
  var cab=parseLine(lin[0]).map(function(h){return h.toLowerCase().replace(/[_\s]/g,'');});
  function ci(n){var i=cab.indexOf(n.toLowerCase().replace(/[_\s]/g,''));return i>=0?i:-1;}
  var IX={id:ci('id')||0,n:ci('nombre')||1,e:ci('especialidad')||2,cargo:ci('cargo')||3,
    rC:ci('redcargo')||4,rE:ci('rededad')||5,rJ:ci('redjornada')||6,
    coord:ci('coordinacion')||7,t:ci('estudor')||8,g:ci('grupotutor')||9,
    ref:ci('esrefuerzo')||10,rT:ci('tiporefuerzo')||11,plan:ci('coordplan')||12,
    hC:ci('horascoord')||13,asig:ci('asig'),gRef:ci('gruporef')};
  var res=[];
  for(var i=1;i<lin.length;i++){
    var r=parseLine(lin[i]);
    var n=trim(r[IX.n]); if(!n) continue;
    var asig=[];
    if(IX.asig>=0){try{var raw=trim(r[IX.asig]);if(raw&&raw.length>2)asig=JSON.parse(raw);}catch(e){}}
    var gRef=IX.gRef>=0?trim(r[IX.gRef]):'';
    if(!gRef) gRef=trim(r[IX.g])||'';
    res.push({id:parseInt(r[IX.id])||i,n:n,e:trim(r[IX.e])||'Primaria',
      cargo:trim(r[IX.cargo]),rC:parseFloat(r[IX.rC])||0,rE:parseFloat(r[IX.rE])||0,
      rJ:parseFloat(r[IX.rJ])||0,coord:parseFloat(r[IX.coord])||0,
      hC:parseFloat(r[IX.hC])||0,t:(trim(r[IX.t])||'').toUpperCase()==='SI',
      g:trim(r[IX.g]),ref:(trim(r[IX.ref])||'').toUpperCase()==='SI',
      rT:trim(r[IX.rT]),plan:trim(r[IX.plan]),gRef:gRef,asig:asig});
  }
  return res.length?res:null;
}
function parseLine(l){var r=[],c='',q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}
function trim(s){return(s||'').replace(/^"|"$/g,'').replace(/""/g,'"').trim();}
function hhmm(){var d=new Date();return(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();}

function goSec(mod,sid,titulo,sub){
  var homeEl=document.getElementById(mod==='plantilla'?'ph':'hh');

function hd(m){return Math.max(0,J-m.rC-m.rE-m.rJ-m.coord-m.hC);}
function hA(m){return(m.asig||[]).reduce(function(a,x){return a+x.h;},0);}
function hL(m){return Math.max(0,hd(m)-hA(m));}
function hdC(h){return h>=18?'#15803d':h>=12?'#92400e':'#b91c1c';}
function fmt(mn){var h=Math.floor(mn/60),m=mn%60;return(h<10?'0':'')+h+':'+(m<10?'0':'')+m;}
function tg(){var s=0;Object.keys(DB.grupos).forEach(function(k){s+=DB.grupos[k]||0;});return s;}
function todosG(){var l=[],lt=['A','B','C','D','E','F'];CURSOS.forEach(function(c){var n=DB.grupos['_'+c]||0;for(var j=0;j<n;j++)l.push(c+lt[j]);});return l;}
function sinTutor(){var a=DB.maestros.filter(function(m){return m.t&&m.g;}).map(function(m){return m.g;});return todosG().filter(function(g){return a.indexOf(g)<0;});}
function getMat(id){return DB.materias.find(function(m){return m.id===id;})||{id:id,n:id,c:'#f3f4f6',t:'#374151'};}
function pill(e){var x=EC[e]||{bg:'#f1f5f9',c:'#475569'};return '<span class="pill" style="background:'+x.bg+';color:'+x.c+'">'+(EL[e]||e)+'</span>';}
function bdg(t,cl){return '<span class="badge '+cl+'">'+t+'</span>';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function calcN(){var ef=0,ing=0,fra=0,ld=0;CURSOS.forEach(function(c,i){var g=DB.grupos['_'+c]||0;ef+=g*BOJA_EF[i];ing+=g*BOJA_ING[i];fra+=g*BOJA_FRA[i];ld+=g*BOJA_LD[i];});return{ef:ef,ing:ing,fra:fra,ld:ld};}
function calcD(){var a={EF:0,Ingles:0,Frances:0,Musica:0,Primaria:0};DB.maestros.forEach(function(m){a[m.e]=(a[m.e]||0)+hd(m);});return a;}
function calcGab(){var mus=0,art=0;CURSOS.forEach(function(c,i){var g=DB.grupos['_'+c]||0;mus+=g*BOJA_MUS[i];if(i>=3)art+=g*BOJA_PLA[i];});var gab=DB.maestros.find(function(m){return m.e==='Musica';})||null;var d=gab?hd(gab):J-3;return{mus:mus,art:art,doc:mus+art,disp:d,libre:Math.max(0,d-mus-art)};}
function barra(m){var d=hd(m),a=hA(m),exc=a>d,pct=d>0?Math.min(100,a/d*100):0;var col=exc?'#b91c1c':pct>90?'#d97706':'#15803d';return '<div class="hbar"><div class="ht"><div class="hf" style="width:'+pct.toFixed(0)+'%;background:'+col+'"></div></div><span style="font-size:11px;font-weight:700;color:'+col+'">'+a.toFixed(1)+'h/'+d.toFixed(1)+'h</span>'+(exc?bdg('EXCESO','rd'):Math.abs(d-a)<.3?bdg('OK','gn'):bdg(hL(m).toFixed(1)+'h libres','gy'))+'</div>';}
function mt(l,v,cls,s){return '<div class="mtr '+(cls||'')+'"><span class="ml">'+l+'</span><div class="mv">'+v+'</div>'+(s?'<div class="ms">'+s+'</div>':"")+'</div>';}
function getCiclo(n){if(!n)return null;n=n.replace(/[A-Fa-f]/g,'').trim();if(n.indexOf('anos')>=0||n.indexOf('Inf')>=0)return'Infantil';if(n==='1o'||n==='2o')return'Primero';if(n==='3o'||n==='4o')return'Segundo';if(n==='5o'||n==='6o')return'Tercero';return null;}

function updF(id,k,v){

  var encontrado=false;
  for(var i=0;i<DB.maestros.length;i++){
    if(DB.maestros[i].id===id){ DB.maestros[i][k]=v; encontrado=true; break; }
  }
  if(!encontrado){ console.error('Maestro no encontrado: '+id); return; }

  // 2. Serializar y guardar
  var json='';
  try{ json=JSON.stringify(DB); }
  catch(e){ alert('Error al serializar datos: '+e.message); return; }

  // 3. Escribir en localStorage
  try{
    localStorage.setItem(KDAT, json);
    // 4. Verificar que realmente se guardó
    var verificacion=localStorage.getItem(KDAT);
    if(!verificacion || verificacion.length < 100){
      alert('ERROR: Los datos no se guardaron correctamente.

Posible causa: modo privado/incógnito del navegador.');

    alert('ERROR al guardar: '+e.message+'

Asegúrate de no estar en modo privado/incógnito.');

function _gen(gid){
  var hor=getHor(gid),cr=DB.hCarga[gid]||{};
  DIAS.forEach(function(d){hor[d].forEach(function(s){if(!s.fij&&!s.r){s.mId=null;s.pId=null;}});});
  var lib=[];DIAS.forEach(function(d){HFRANJAS.forEach(function(f,fi){if(f.r)return;var s=hor[d][fi];if(!s.fij&&!s.mId)lib.push({d:d,fi:fi,ok:false});});});
  var bl=[];Object.keys(cr).forEach(function(mid){var cv=cr[mid];if(!cv.h||cv.h<=0||!cv.m)return;var n=Math.max(1,Math.round(cv.h));for(var i=0;i<n;i++)bl.push({mId:mid,pId:cv.m});});
  var li=0;bl.forEach(function(b){for(var t=0;t<lib.length;t++){var fi=(li+t)%lib.length,lf=lib[fi];if(lf.ok)continue;if(!pLibre(b.pId,lf.d,lf.fi,gid))continue;hor[lf.d][lf.fi].mId=b.mId;hor[lf.d][lf.fi].pId=b.pId;lf.ok=true;li=(fi+1)%lib.length;break;}});
}

function getSustKey(dia){return 'sust_'+dia;}
function loadSust(dia){try{var r=localStorage.getItem(getSustKey(dia));return r?JSON.parse(r):{};}catch(e){return{};}}
function saveSust(dia,t){try{localStorage.setItem(getSustKey(dia),JSON.stringify(t));}catch(e){}}

function priSust(m,gid,cicloD){
  if((m.asig||[]).some(function(a){return a.gid===gid;}))return 0;
  var cM=getCiclo((m.gRef||m.g||'').replace(/[A-Fa-f]/g,''));
  if(cM===cicloD)return 1;
  var adj={Primero:['Segundo','Infantil'],Segundo:['Primero','Tercero'],Tercero:['Segundo'],Infantil:['Primero']};
  if(cM&&cicloD&&(adj[cicloD]||[]).indexOf(cM)>=0)return 2;
  return 3;
}

function togFalta(id){var i=SUST_FALTAN.indexOf(id);if(i>=0)SUST_FALTAN.splice(i,1);else SUST_FALTAN.push(id);updDot();renderSust();}

function updTramo(i,k,v){DB.tramos[i][k]=v;if(k==='i'||k==='f')DB.tramos[i].l=DB.tramos[i].i+'–'+DB.tramos[i].f;save();renderSust();}
function addTramo(){DB.tramos.push({id:'t'+Date.now(),l:'9:00–10:00',i:'9:00',f:'10:00',r:false});save();renderSust();}

function genTabla(){
  var tbl=loadSust(SUST_DIA);
  SUST_FALTAN.forEach(function(mFId){
    var mF=DB.maestros.find(function(m){return m.id===mFId;});if(!mF)return;
    var grupos=[];(mF.asig||[]).forEach(function(a){if(grupos.indexOf(a.gid)<0)grupos.push(a.gid);});if(mF.t&&mF.g&&grupos.indexOf(mF.g)<0)grupos.push(mF.g);
    DB.tramos.forEach(function(t,ti){
      var key=mFId+'_'+ti;
      if(tbl[key]&&tbl[key].manual)return; // no sobreescribir cambios manuales
      if(t.r){tbl[key]={grupo:'',sust:'',txt:'X'};return;}
      if(grupos.length===0){tbl[key]={grupo:'',sust:'',txt:'X'};return;}
      var gS=grupos[ti%grupos.length];
      var cicloD=getCiclo(gS.replace(/[A-Fa-f]/g,''));
      var cands=DB.maestros.filter(function(m){return SUST_FALTAN.indexOf(m.id)<0&&['Infantil','PT','AL'].indexOf(m.e)<0;});
      // Contar carga acumulada para repartir
      var carga={};Object.values(tbl).forEach(function(c){if(c&&c.sust)carga[c.sust]=(carga[c.sust]||0)+1;});
      cands.sort(function(a,b){var pa=priSust(a,gS,cicloD),pb=priSust(b,gS,cicloD);if(pa!==pb)return pa-pb;var ca=carga[a.n]||0,cb=carga[b.n]||0;if(ca!==cb)return ca-cb;return hL(b)-hL(a);});
      var mejor=cands[0];
      tbl[key]={grupo:gS,sust:mejor?mejor.n:'',txt:''};
    });
  });
  saveSust(SUST_DIA,tbl);renderSust();
}

function limpTabla(){if(!confirm('Limpiar tabla?'))return;saveSust(SUST_DIA,{});renderSust();}

function openCell(mFId,ti,dia){
  var key=mFId+'_'+ti;
  var tbl=loadSust(dia);
  var cel=tbl[key]||{grupo:'',sust:'',txt:''};
  var mF=DB.maestros.find(function(m){return m.id===mFId;});
  var t=DB.tramos[ti];
  SUST_CELDA={mFId:mFId,ti:ti,dia:dia,key:key};
  var modal=document.getElementById('modal-sust');
  if(!modal)return;
  document.getElementById('modal-t').textContent=(t?t.l:'Tramo')+' — '+(mF?mF.n:'?');
  document.getElementById('m-grupo').value=cel.grupo||'';
  var sel=document.getElementById('m-mae');
  sel.innerHTML='<option value="">— Sin sustituto —</option>';
  var disp=DB.maestros.filter(function(m){return SUST_FALTAN.indexOf(m.id)<0&&['Infantil','PT','AL'].indexOf(m.e)<0;});
  var gS=cel.grupo||'';var cicloD=getCiclo(gS.replace(/[A-Fa-f]/g,''));
  disp.sort(function(a,b){var pa=priSust(a,gS,cicloD),pb=priSust(b,gS,cicloD);if(pa!==pb)return pa-pb;return hL(b)-hL(a);});
  var lastP=-1;
  var pLbls=['🎯 Da clase aquí','✅ Mismo ciclo','🔶 Ciclo adyacente','⬜ Otro ciclo'];
  disp.forEach(function(m){
    var p=priSust(m,gS,cicloD);
    if(p!==lastP){var sep=document.createElement('option');sep.disabled=true;sep.textContent='── '+pLbls[p]+' ──';sel.appendChild(sep);lastP=p;}
    var o=document.createElement('option');o.value=m.n;o.textContent=m.n+' ('+hL(m).toFixed(1)+'h)';if(m.n===cel.sust)o.selected=true;sel.appendChild(o);
  });
  document.getElementById('m-txt').value=(cel.txt&&cel.txt!=='X')?cel.txt:'';
  modal.classList.add('on');
}
function closeModal(){document.getElementById('modal-sust').classList.remove('on');SUST_CELDA=null;}
function applyCell(){
  if(!SUST_CELDA)return;
  var tbl=loadSust(SUST_CELDA.dia);
  var g=(document.getElementById('m-grupo')||{}).value||'';
  var s=(document.getElementById('m-mae')||{}).value||'';

  tbl[SUST_CELDA.key]={grupo:g,sust:t?t:s,txt:t&&t!==s?t:'',manual:true};

  closeModal();renderSust();

function emptyCell(){

  h+='<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><button class="btn bvd bsm" onclick="saveConex()">Guardar conexión</button><button class="btn bgy bsm" onclick="testConex()">Probar</button><button class="btn" style="background:#7c3aed;color:#fff;padding:5px 10px;font-size:11px;border-radius:6px" onclick="recibirCambios()">📥 Recibir de Sheets</button></div></div>';

  h+='<div class="card"><div class="ct">🔐 Contraseña</div>';
  h+='<div class="al i" style="margin-bottom:10px"><span>ℹ️</span><span>La contraseña de fábrica es <strong>ceip2025</strong>. Si la cambias, los demás dispositivos la recibirán al pulsar Sync.</span></div>';
  h+='<div class="fr"><span class="fl">Nueva contraseña (min. 4 caracteres)</span><input class="fi" type="password" id="inp-pwd" placeholder="Nueva contraseña..."></div>';
  h+='<div style="display:flex;gap:8px;margin-top:6px"><button class="btn bvd bsm" onclick="savePwd()">Cambiar contraseña</button><button class="btn bgy bsm" onclick="doLogout()">Cerrar sesión</button></div></div>';

  h+='<div class="card"><div class="ct">📋 Script Apps Script</div>';
  h+='<div style="font-size:12px;color:#64748b;margin-bottom:8px">Copia este código en tu Apps Script de Google Sheets:</div>';
  h+='<button class="btn bgy bsm" onclick="copyScript()">📋 Copiar código</button></div>';

  h+='<div class="card"><div class="ct" style="color:#b91c1c">⚠️ Datos</div>';
  h+='<button class="btn brd" style="width:100%;margin-top:4px" onclick="resetData()">Resetear todos los datos al estado inicial</button></div>';

  document.getElementById('pg-config-inner').innerHTML=h;
}

function testLS(){
  var res=document.getElementById('ls-res');
  try{
    localStorage.setItem('_test','ok');
    if(localStorage.getItem('_test')!=='ok')throw new Error('No persiste');
    localStorage.removeItem('_test');
    var ok=save();
    var chk=localStorage.getItem(KDAT);
    if(chk&&chk.length>100){
      var d=JSON.parse(chk);
      res.innerHTML='<span style="color:#15803d;font-weight:700">✅ localStorage funciona. Datos: '+Math.round(chk.length/1024)+'KB. Primer maestro: '+d.maestros[0].n+'</span>';
    }else{
      res.innerHTML='<span style="color:#b91c1c;font-weight:700">❌ localStorage no guarda datos. Comprueba que no estás en modo privado/incógnito.</span>';
    }
  }catch(e){
    res.innerHTML='<span style="color:#b91c1c;font-weight:700">❌ Error: '+e.message+'. Posiblemente en modo privado o sin permisos.</span>';
  }
}

function testConex(){
  var sid=document.getElementById('inp-sheet').value.trim();
  if(!sid){alert('Introduce el ID de la hoja.');return;}
  var url='https://docs.google.com/spreadsheets/d/'+sid+'/gviz/tq?tqx=out:csv&sheet=Maestros&_='+Date.now();
  fetch(url,{cache:'no-store'})
  .then(function(r){return r.text();})
  .then(function(t){
    if(t&&t.length>20)alert('✅ Conexión con Sheets OK. Datos recibidos: '+t.length+' bytes');
    else alert('⚠️ Sheets accesible pero hoja Maestros vacía. Sube los datos con Sync.');
  })
  .catch(function(e){alert('❌ Error: '+e.message);});
}

function saveConex(){
  DB.scriptUrl=(document.getElementById('inp-script')||{}).value||'';
  DB.sheetId=(document.getElementById('inp-sheet')||{}).value||'';
  save();
  alert('✅ Conexión guardada');
}

function savePwd(){
  var v=((document.getElementById('inp-pwd')||{}).value||'').trim();
  if(!v||v.length<4){alert('La contraseña debe tener al menos 4 caracteres');return;}
  localStorage.setItem(KPWD,v);
  DB.pwd=v;
  save();
  alert('✅ Contraseña cambiada: '+v+'\nLos demás dispositivos la recibirán al pulsar Sync.');
  document.getElementById('inp-pwd').value='';
}

function doLogout(){sessionStorage.removeItem('ceip_s');location.reload();}

function resetData(){
  if(!confirm('⚠️ RESETEAR TODOS LOS DATOS al estado inicial?\n\nEsta acción no se puede deshacer.'))return;
  localStorage.removeItem(KDAT);
  DB=DEF();
  calcFranjas();
  save();
  renderPlantillaHome();
  renderHorariosHome();
  alert('Datos reseteados. La app ha vuelto al estado inicial.');
}

var SCRIPTS='';

function copyScript(){
  if(navigator.clipboard){
    navigator.clipboard.writeText(SCRIPTS).then(function(){alert('✅ Código copiado. Pégalo en Apps Script y vuelve a implementar como "Nueva versión" con acceso "Cualquier persona".');});
  }else{
    var t=document.createElement('textarea');t.value=SCRIPTS;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
    alert('✅ Código copiado.');
  }
}
